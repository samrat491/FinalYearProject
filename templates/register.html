<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="center">

<form id="registerForm" method="POST" class="card">

<h2>Register</h2>
<button id="themeToggle">🌙</button>
<input name="name"
type="text"
placeholder="Full Name"
required>

<select name="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input name="birthdate"
type="date"
required>

<input name="email"
type="email"
placeholder="Email"
required>

<input name="password"
type="password"
placeholder="Password"
required>

<!-- Khalti Button -->
<button type="button" id="paymentBtn" class="btn" style="background: #5c2d91; font-weight: bold;">
Pay Rs. 500 (Khalti Demo) & Register
</button>

{% for msg in get_flashed_messages() %}
<p class="error">{{ msg }}</p>
{% endfor %}

<p class="link">
<a href="/">Back to Login</a>
</p>

</form>

</div>

<script>
if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light");
}
</script>

<!-- Mode Toggle -->
<script>
const toggleBtn =
document.getElementById("themeToggle");

if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light");
toggleBtn.textContent="☀️";
}

toggleBtn.onclick=()=>{

document.body.classList.toggle("light");

if(document.body.classList.contains("light")){
localStorage.setItem("theme","light");
toggleBtn.textContent="☀️";
}else{
localStorage.setItem("theme","dark");
toggleBtn.textContent="🌙";
}
}
</script>

<!-- Custom Khalti Mock UI Modal -->
<div id="khaltiModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: white; color: black; padding: 25px; width: 320px; border-radius: 8px; font-family: Arial, sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
        <div style="text-align: center; margin-bottom: 20px;">
            <h3 style="color: #5c2d91; margin: 0; font-size: 22px;">Khalti Payment</h3>
            <p style="font-size: 12px; color: gray; margin-top: 5px;">Test / Mock Mode</p>
        </div>

        <!-- Step 1: Phone & MPIN -->
        <div id="khaltiStep1">
            <label style="font-size: 13px; font-weight: bold; color: #333;">Khalti Mobile Number</label>
            <input type="text" id="k_phone" placeholder="10-digit number" maxlength="10" style="background: #f9f9f9; border: 1px solid #ccc; color: black; margin-top: 5px; margin-bottom: 15px; padding: 10px;">

            <label style="font-size: 13px; font-weight: bold; color: #333;">Khalti MPIN</label>
            <input type="password" id="k_mpin" placeholder="6-digit MPIN" maxlength="6" style="background: #f9f9f9; border: 1px solid #ccc; color: black; margin-top: 5px; margin-bottom: 20px; padding: 10px;">

            <button type="button" id="k_initiateBtn" style="background: #5c2d91; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold;">Initiate Payment</button>
            <button type="button" class="k_closeBtn" style="background: transparent; color: #5c2d91; border: none; padding: 10px; width: 100%; margin-top: 5px; cursor: pointer; font-size: 13px;">Cancel</button>
        </div>

        <!-- Step 2: OTP -->
        <div id="khaltiStep2" style="display: none;">
            <p style="font-size: 13px; text-align: center; margin-bottom: 20px; color: #444;">An OTP has been sent to your mobile number.</p>
            
            <label style="font-size: 13px; font-weight: bold; color: #333;">Payment OTP</label>
            <input type="text" id="k_otp" placeholder="6-digit OTP" maxlength="6" style="background: #f9f9f9; border: 1px solid #ccc; color: black; margin-top: 5px; margin-bottom: 20px; padding: 10px;">

            <button type="button" id="k_verifyBtn" style="background: #5c2d91; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold;">Verify & Pay</button>
            <button type="button" class="k_closeBtn" style="background: transparent; color: #5c2d91; border: none; padding: 10px; width: 100%; margin-top: 5px; cursor: pointer; font-size: 13px;">Cancel</button>
        </div>
    </div>
</div>

<script>
    const modal = document.getElementById('khaltiModal');
    const step1 = document.getElementById('khaltiStep1');
    const step2 = document.getElementById('khaltiStep2');
    const form = document.getElementById('registerForm');
    
    document.getElementById("paymentBtn").onclick = function () {
        if (form.checkValidity()) {
            modal.style.display = 'flex';
            step1.style.display = 'block';
            step2.style.display = 'none';
            
            // Clear input fields when modal opens
            document.getElementById('k_phone').value = '';
            document.getElementById('k_mpin').value = '';
            document.getElementById('k_otp').value = '';
        } else {
            form.reportValidity();
        }
    };

    document.querySelectorAll('.k_closeBtn').forEach(btn => {
        btn.onclick = () => modal.style.display = 'none';
    });

    document.getElementById('k_initiateBtn').onclick = () => {
        const phone = document.getElementById('k_phone').value;
        const mpin = document.getElementById('k_mpin').value;
        
        // Loose validation: just checks lengths and ensures they are numeric
        if (phone.length === 10 && !isNaN(phone) && mpin.length === 6 && !isNaN(mpin)) {
            step1.style.display = 'none';
            step2.style.display = 'block';
        } else {
            alert('Please enter any 10-digit phone number and 6-digit MPIN.');
        }
    };

    document.getElementById('k_verifyBtn').onclick = () => {
        const otp = document.getElementById('k_otp').value;
        
        if (otp.length === 6 && !isNaN(otp)) {
            modal.style.display = 'none';
            form.submit(); // Automatically submit the registration form to backend
        } else {
            alert('Please enter any 6-digit OTP.');
        }
    };
</script>
</body>
</html>
