<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ story[0] }} - Reader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="reader-theme-light" id="reader-body">

    <!-- Top Navigation / Settings -->
    <header class="reader-header" id="reader-header">
        <a href="/home" class="reader-back-btn">← Back</a>
        
        <div class="reader-story-title">{{ story[0] }}</div>
        
        <div class="reader-controls">
            <button class="reader-btn-icon" onclick="changeFontSize(-2)">A-</button>
            <button class="reader-btn-icon" onclick="changeFontSize(2)">A+</button>
            <div class="theme-switchers">
                <button class="theme-btn light" onclick="setTheme('light')" title="Light"></button>
                <button class="theme-btn sepia" onclick="setTheme('sepia')" title="Sepia"></button>
                <button class="theme-btn dark" onclick="setTheme('dark')" title="Dark"></button>
            </div>
            {% if chapters %}
            <select id="chapter-select" class="reader-select" onchange="jumpToChapter(this.value)">
                {% for chapter in chapters %}
                    <option value="{{ loop.index0 }}">Ch. {{ chapter[0] }}</option>
                {% endfor %}
            </select>
            {% endif %}
        </div>
    </header>

    <!-- Chapter Content Area -->
    <main class="reader-content-wrapper">
        {% for chapter in chapters %}
            <article class="chapter-container" id="chapter-{{ loop.index0 }}" style="display: none;">
                <div class="chapter-header-text">
                    <h2 class="chapter-num">Chapter {{ chapter[0] }}</h2>
                    <h1 class="chapter-name">{{ chapter[1] }}</h1>
                </div>
                <div class="chapter-body-text">
                    {{ chapter[2] }}
                </div>
                <div class="chapter-bottom-nav">
                    <button class="reader-nav-btn outline" id="prev-btn-{{ loop.index0 }}" onclick="navigateChapter(-1)">← Previous</button>
                    <button class="reader-nav-btn solid" id="next-btn-{{ loop.index0 }}" onclick="navigateChapter(1)">Next Chapter →</button>
                </div>
            </article>
        {% else %}
            <div class="reader-empty">No chapters available yet.</div>
        {% endfor %}
    </main>

    <script>
        // State
        let currentChapterIndex = 0;
        const totalChapters = parseInt('{{ chapters|length }}', 10) || 0;
        let currentFontSize = 18;

        // DOM Elements
        const header = document.getElementById('reader-header');
        let lastScroll = window.scrollY;
        
        // Auto-hide header
        window.addEventListener('scroll', () => {
            if (window.scrollY > lastScroll && window.scrollY > 100) {
                header.classList.add('hidden');
            } else {
                header.classList.remove('hidden');
            }
            lastScroll = window.scrollY;
        });

        // Theme Management
        function setTheme(theme) {
            document.getElementById('reader-body').className = 'reader-theme-' + theme;
            localStorage.setItem('readerTheme', theme);
        }

        // Font Size Management
        function changeFontSize(delta) {
            currentFontSize = Math.max(14, Math.min(30, currentFontSize + delta));
            document.documentElement.style.setProperty('--reader-font-size', currentFontSize + 'px');
        }

        // Chapter Navigation
        function showChapter(index) {
            if (totalChapters === 0) return;
            
            // Hide all
            document.querySelectorAll('.chapter-container').forEach(el => el.style.display = 'none');
            
            // Show target
            const target = document.getElementById('chapter-' + index);
            if (target) {
                target.style.display = 'block';
                window.scrollTo(0, 0);
                header.classList.remove('hidden');
            }
            
            // Update Select
            const select = document.getElementById('chapter-select');
            if (select) select.value = index;

            // Update Buttons
            const prevBtn = document.getElementById('prev-btn-' + index);
            const nextBtn = document.getElementById('next-btn-' + index);
            if (prevBtn) prevBtn.disabled = (index === 0);
            if (nextBtn) nextBtn.disabled = (index === totalChapters - 1);
        }

        function navigateChapter(direction) {
            const nextIndex = currentChapterIndex + direction;
            if (nextIndex >= 0 && nextIndex < totalChapters) {
                currentChapterIndex = nextIndex;
                showChapter(currentChapterIndex);
            }
        }

        function jumpToChapter(val) {
            currentChapterIndex = parseInt(val, 10);
            showChapter(currentChapterIndex);
        }

        // Initialization
        window.onload = () => {
            const savedTheme = localStorage.getItem('readerTheme') || 'light';
            setTheme(savedTheme);
            showChapter(0);
        };
    </script>
</body>
</html>
