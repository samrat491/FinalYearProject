<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <div class="nav-left">
        <a href="/home" class="nav-link">🏠 Home</a>
        <a class="nav-link">👤 About</a>
        <a href="/filter" class="nav-link">🔎 Filter</a>
        <a href="/dashboard" class="nav-link">📘 Dashboard</a>
    </div>
    <div class="nav-right">
        <button id="themeToggle">🌙</button>
    </div>
</div>

<div class="center">
    <form class="card" method="POST">
        <div class="avatar">👤</div>

        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <div class="options" style="justify-content: center;">
            <label><input type="checkbox"> Remember me</label>
            <!-- Removed the Forgot Password link from here -->
        </div>

        <button class="btn">Log In</button>

        {% for msg in get_flashed_messages() %}
            <p class="error">{{ msg }}</p>
        {% endfor %}

        <!-- Added Register Link Here -->
        <p class="link" style="text-align: center; margin-top: 15px; font-size: 14px;">
            Don't have an account? <a href="/register" style="color: #8a2be2; text-decoration: none; font-weight: bold;">Register here</a>
        </p>

    </form>
</div>

<script>
const toggleBtn = document.getElementById("themeToggle");

if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light");
    toggleBtn.textContent = "☀️";
}

toggleBtn.addEventListener("click", () => {
    document.body.classList.toggle("light");

    if (document.body.classList.contains("light")) {
        localStorage.setItem("theme", "light");
        toggleBtn.textContent = "☀️";
    } else {
        localStorage.setItem("theme", "dark");
        toggleBtn.textContent = "🌙";
    }
});
</script>

</body>
</html>
